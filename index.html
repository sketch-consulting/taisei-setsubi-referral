<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">REFERRAL RECRUITING | 採用情報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           カラー設定（大成設備工業 ブランドカラー）
        ============================================================ */
        :root {
            --accent:      #2E87D4;   /* メインアクセント：青 */
            --accent-dark: #1B4F8A;   /* 濃紺 */
            --accent-muted: rgba(46, 135, 212, 0.08); /* 薄い青背景 */
            --warm-bg:     #f0f5fa;   /* 全体背景：淡いブルーグレー */
            --card-bg:     #f8fafd;   /* カード背景 */
            --footer-bg:   #1B4F8A;   /* フッター：濃紺 */
            --text-main:   #1e2a3a;   /* 文字色：濃紺系 */
            --border-light: #dbeafe;  /* 薄い青ボーダー（blue-100相当） */
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: var(--warm-bg);
            line-height: 1.8;
            overflow-x: hidden;
        }

        .text-warm   { color: var(--accent); }
        .bg-warm     { background-color: var(--accent); }
        .bg-card     { background-color: var(--card-bg); }
        .border-warm { border-color: var(--accent); }
        .bg-accent-muted { background-color: var(--accent-muted); }

        section { scroll-margin-top: 80px; }

        /* セクションタイトル */
        .section-title {
            position: relative;
            padding-bottom: 20px;
            margin-bottom: 40px;
            font-weight: 700;
            font-size: clamp(1.4rem, 3vw, 1.75rem);
            text-align: center;
        }
        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background-color: var(--accent);
        }

        /* ヒーローテキスト */
        .hero-text-wrap {
            display: inline-block;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        /* モバイルメニュー */
        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }

        /* ============================================================
           スクロールアニメーション
        ============================================================ */
        .fade-in {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.65s ease, transform 0.65s ease;
        }
        .fade-in.delay-1 { transition-delay: 0.1s; }
        .fade-in.delay-2 { transition-delay: 0.2s; }
        .fade-in.delay-3 { transition-delay: 0.3s; }
        .fade-in.delay-4 { transition-delay: 0.4s; }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================================
           ヒーローセクション（白背景・テキスト＋下部画像）
        ============================================================ */
        #top {
            background: #ffffff;
            padding-top: 100px; /* ヘッダー分オフセット */
            text-align: center;
        }

        /* ラベル（SPECIAL INVITATION） */
        .hero-label {
            display: inline-block;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        /* キャッチコピー */
        .hero-h1 {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.6;
            color: #111111;
            margin-bottom: 1.5rem;
        }

        /* サブコピー */
        .hero-subtitle {
            font-family: 'Noto Sans JP', sans-serif;
            color: #555555;
            font-size: clamp(0.875rem, 2vw, 1rem);
            line-height: 2;
            letter-spacing: 0.04em;
            margin-bottom: 2rem;
        }

        /* CTAボタン */
        .hero-cta-btn {
            display: inline-block;
            background: var(--accent);
            color: #ffffff;
            padding: 1rem 2.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 16px rgba(46, 135, 212, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 3rem;
        }
        .hero-cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(46, 135, 212, 0.45);
        }

        /* 画像フェードインアニメーション */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero-image-wrapper {
            margin: 0 40px 40px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: fadeInDown 0.8s ease-out forwards;
        }
        .hero-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        @media (max-width: 768px) {
            .hero-image-wrapper {
                margin: 0 16px 24px 16px;
                border-radius: 12px;
            }
        }

        @media (max-width: 640px) {
            .hero-cta-btn { font-size: 0.875rem; padding: 0.875rem 2rem; }
            .hero-img-bottom img { max-height: 280px; }
        }

        /* ジョブカード */
        .job-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(46, 135, 212, 0.18);
        }
        .job-card-header {
            background-color: var(--accent-muted);
            border-bottom: 1px solid var(--border-light);
        }

        /* キャッチコピー アンダーラインアニメーション */
        .highlight {
            position: relative;
            display: inline;
        }
        .highlight::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 6px;
            background: #2E87D4;
            border-radius: 2px;
            transition: width 0.6s ease-out;
        }
        .highlight.active::after {
            width: 100%;
        }

        /* 外部リンクバナー */
        #external-banner {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
        }

        /* カルチャーセクション */
        .culture-card {
            background: linear-gradient(135deg, #eef4fb 0%, #e8f0fb 100%);
            border-left: 4px solid var(--accent);
        }

        /* ギャラリー画像 */
        .gallery-img {
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 1rem;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        .gallery-img:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        /* ステップカード・テーブルのボーダー */
        .border-accent-light { border-color: var(--border-light); }

        /* 会社概要テーブル */
        .about-th-bg { background-color: rgba(219, 234, 254, 0.3); }

        /* ============================================================
           スマホ最適化
        ============================================================ */
        @media (max-width: 640px) {
            .section-title { font-size: 1.35rem; }
            .hero-h1       { font-size: 1.65rem; line-height: 1.5; }

            .step-card {
                display: flex;
                align-items: flex-start;
                gap: 1rem;
                text-align: left;
            }
            .step-number {
                flex-shrink: 0;
                width: 2.5rem;
                height: 2.5rem;
                font-size: 1rem;
            }

            .job-grid { grid-template-columns: 1fr !important; gap: 1rem !important; }

            .about-table tr  { display: flex; flex-direction: column; }
            .about-table th  { width: 100%; padding-bottom: 0.25rem; }
            .about-table td  { padding-top: 0.25rem; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
         Header
    ============================================================ -->
    <header class="fixed w-full z-50 bg-white/95 backdrop-blur-md shadow-sm h-16 md:h-20">
        <div class="max-w-7xl mx-auto px-5 md:px-8 h-full flex justify-between items-center">
            <span id="header-company-name" class="font-bold tracking-tight text-base md:text-xl text-warm uppercase"></span>

            <!-- デスクトップナビ -->
            <nav class="hidden md:flex items-center space-x-6 text-sm font-bold">
                <a href="#steps"   class="hover:text-warm transition">選考ステップ</a>

                <span class="w-6 h-0.5 bg-warm transition-all"></span>

    <!-- スマホメニュー -->
    <div id="mobile-menu" class="fixed inset-0 bg-white z-[55] flex flex-col items-center justify-center space-y-8 md:hidden font-bold">
        <a href="#steps"   class="text-lg mobile-link">選考ステップ</a>
        <a href="#gallery" class="text-lg mobile-link">職場風景</a>
        <a href="#culture" class="text-lg mobile-link">カルチャー</a>
        <a href="#jobs"    class="text-lg mobile-link">募集職種</a>
        <a href="#about"   class="text-lg mobile-link">会社概要</a>
        <a href="#form" class="bg-warm text-white px-10 py-4 rounded-full mobile-link shadow-lg">面談フォームへ</a>

    <!-- ============================================================

    <section id="top">
        <!-- テキストエリア -->
        <div class="max-w-3xl mx-auto px-5 md:px-8 pb-10 fade-in">
            <p class="hero-label">SPECIAL INVITATION</p>
            <h1 id="hero-title" class="hero-h1"

                <!-- JSで生成 -->

         3. 職場風景（ギャラリー）
    ============================================================ -->
    <section id="gallery" class="py-20 px-5 md:px-8 bg-white/30">
        <div class="max-w-5xl mx-auto text-center">
            <h2 class="section-title fade-in">職場風景</h2>
            <div id="gallery-container" class="grid grid-cols-2 gap-4 md:gap-6">
                <!-- JSで生成 -->
            </div>
        </div>
    </section>


    <!-- ============================================================
         4. カルチャーセクション

    <section id="culture" class="py-20 px-5 md:px-8">

    ============================================================ -->
    <section id="form" class="py-24 px-5 md:px-8 bg-white/20">

            <h2 class="section-title fade-in">面談フォーム</h2>

                    id="form-iframe"

         Footer
    ============================================================ -->

            <p id="footer-company-name" class="font-bold tracking-widest text-sm uppercase italic"></p>
            <p id="footer-copyright" class="text-[10px] text-white/40 tracking-[0.3em] uppercase"></p>
        </div>

    <!-- ============================================================
         JavaScript
    ============================================================ -->
    <script>
    /* --------------------------------------------------
       モバイルメニュー
    -------------------------------------------------- */
    const menuBtn    = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const spans      = menuBtn.querySelectorAll('span');

    menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('open');
        spans[0].classList.toggle('rotate-45');
        spans[0].classList.toggle('translate-y-2');
        spans[1].classList.toggle('opacity-0');
        spans[2].classList.toggle('-rotate-45');
        spans[2].classList.toggle('-translate-y-2');
    });

    document.querySelectorAll('.mobile-link').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.remove('open');
            spans[0].classList.remove('rotate-45', 'translate-y-2');
            spans[1].classList.remove('opacity-0');
            spans[2].classList.remove('-rotate-45', '-translate-y-2');
        });
    });

    /* --------------------------------------------------
       スクロールアニメーション（Intersection Observer）
    -------------------------------------------------- */
    function initAnimations() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    }

    /* --------------------------------------------------
       ユーティリティ: 改行を <br> に変換
    -------------------------------------------------- */
    function nl2br(text) {
        return text.replace(/\n/g, '<br>');
    }

    /* --------------------------------------------------
       company.json の読み込みとレンダリング
    -------------------------------------------------- */
    async function loadCompany() {
        let c;
        try {
            const res = await fetch('company.json');
            if (!res.ok) throw new Error('company.json が見つかりません');
            c = await res.json();
        } catch (e) {
            document.body.innerHTML = `<div style="padding:4rem;text-align:center;font-family:sans-serif;">
                <h1 style="color:#2E87D4;">company.json の読み込みに失敗しました</h1>
                <p>${e.message}</p>
            </div>`;
            return;
        }
        render(c);
    }

    function render(c) {
        /* ---- ページタイトル ---- */
        document.getElementById('page-title').textContent =
            `REFERRAL RECRUITING | ${c.company_name}`;

        /* ---- Header ---- */
        document.getElementById('header-company-name').textContent = c.company_name;

        /* ---- Hero ---- */
        document.getElementById('hero-title').innerHTML = nl2br(c.hero_title)
            .replace('新しいキャリア', '<span class="highlight">新しいキャリア</span>');
        document.getElementById('hero-subtitle').innerHTML = nl2br(c.hero_subtitle);
        document.getElementById('hero-cta').textContent = c.hero_cta || 'まずはカジュアルに話を聞く';
        document.getElementById('hero-image').src = c.hero_image;
        document.getElementById('hero-image').alt = c.company_name + ' メインビジュアル';

        /* ---- 選考ステップ ---- */
        const stepsContainer = document.getElementById('steps-container');
        const delayClasses = ['', 'delay-1', 'delay-2', 'delay-3', 'delay-4'];
        stepsContainer.innerHTML = c.steps.map((step, i) => `
            <div class="step-card bg-card p-7 md:p-8 rounded-2xl shadow-sm border border-accent-light fade-in ${delayClasses[i] || ''}">
                <div class="step-number w-12 h-12 bg-warm text-white rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-4 flex-shrink-0">
                    ${step.number}
                </div>
                <div>
                    <h3 class="font-bold mb-2 text-sm md:text-base">${step.title}</h3>
                    <p class="text-xs text-gray-500 leading-relaxed">${step.description}</p>
                </div>
            </div>
        `).join('');

        /* ---- ギャラリー ---- */
        const galleryContainer = document.getElementById('gallery-container');
        galleryContainer.innerHTML = c.gallery_images.map((src, i) => `
            <div class="overflow-hidden rounded-xl fade-in ${delayClasses[i] || ''}">
                <img src="${src}" class="gallery-img w-full" alt="職場風景 ${i + 1}" loading="lazy">
            </div>
        `).join('');

        /* ---- カルチャー ---- */
        document.getElementById('culture-title').textContent = c.culture_title;
        document.getElementById('culture-body').innerHTML = nl2br(c.culture_body);

        /* ---- 外部リンクバナー ---- */
        if (c.external_link_url && c.external_link_url.trim() !== '') {
            const banner = document.getElementById('external-banner');
            banner.classList.remove('hidden');
            document.getElementById('external-link').href = c.external_link_url;
            document.getElementById('external-link-label').textContent =
                c.external_link_label || '詳しくはこちら';
        }

        /* ---- 募集職種（カード形式） ---- */
        const jobsContainer = document.getElementById('jobs-container');
        jobsContainer.innerHTML = c.jobs.map((job, i) => {
            const reqLines = job.requirements.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => `<li class="flex items-start gap-2"><span class="text-warm mt-0.5">▸</span><span>${line}</span></li>`)
                .join('');
            return `
            <div class="job-card bg-card rounded-3xl border border-accent-light shadow-sm overflow-hidden fade-in ${delayClasses[i] || ''}">
                <div class="job-card-header px-7 py-5">
                    <h3 class="text-lg font-bold text-warm tracking-wider">${job.title}</h3>
                </div>
                <div class="px-7 py-6 space-y-5 text-sm leading-relaxed">
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 mb-2 tracking-widest uppercase">仕事内容</p>
                        <p class="text-gray-600">${job.content}</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 mb-2 tracking-widest uppercase">求める要件</p>
                        <ul class="text-gray-600 space-y-1">${reqLines}</ul>
                    </div>
                    <div class="pt-2">
                        <a href="#form" class="inline-block bg-warm text-white text-xs font-bold px-5 py-2 rounded-full hover:opacity-90 transition shadow-sm">
                            この職種に応募する
                        </a>
                    </div>
                </div>
            </div>`;
        }).join('');

        /* ---- 会社概要 ---- */
        const aboutTbody = document.getElementById('about-tbody');
        const aboutRows = [
            { label: '会社名',   value: c.company_name, bold: true },
            { label: '代表者',   value: c.representative },
            { label: '設立',     value: c.founded },
            { label: '社員数',   value: c.employee_count },
            { label: '所在地',   value: c.address },
            { label: '事業内容', value: c.business },
        ];
        if (c.license_info && c.license_info.trim() !== '') {
            aboutRows.push({ label: '許認可情報', value: c.license_info });
        }

        aboutTbody.innerHTML = aboutRows.map((row, i) => {
            const isLast    = i === aboutRows.length - 1;
            const border    = isLast ? '' : 'border-b border-accent-light';
            const valueClass = row.bold ? 'font-bold' : 'text-gray-600';
            return `
            <tr class="${border}">
                <th class="py-4 md:py-5 px-5 md:px-6 about-th-bg font-bold text-warm w-1/3 text-[10px] md:text-xs tracking-widest align-top">
                    ${row.label}
                </th>
                <td class="py-4 md:py-5 px-5 md:px-6 ${valueClass} leading-relaxed">${row.value}</td>
            </tr>`;
        }).join('');

        /* ---- フォーム ---- */
        document.getElementById('form-iframe').src = c.form_embed_url;

        /* ---- フッター ---- */
        document.getElementById('footer-company-name').textContent = c.company_name;
        document.getElementById('footer-copyright').textContent =
            `© ${c.company_name} All Rights Reserved.`;

        /* ---- アニメーション初期化（DOM生成後） ---- */
        initAnimations();
    }

    loadCompany();

    /* アンダーラインアニメーション：ロード後0.8秒で発火 */
    window.addEventListener('load', () => {
        setTimeout(() => {
            const el = document.querySelector('.highlight');
            if (el) el.classList.add('active');
        }, 800);
    });
    </script>

</body>
</html>
